server:
  servlet:
    context-path: /${spring.application.name}
spring:
  application:
    name: banking
  datasource:
    url: jdbc:h2:mem:banking-db
    username: system
    password: 'system'
  h2:
    console:
      enabled: true
      path: /h2-console
  jpa:
    properties:
      hibernate:
        format-sql: true
    show-sql: false