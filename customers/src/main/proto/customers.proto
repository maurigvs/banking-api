syntax = "proto3";

option java_multiple_files = true;
option java_package = "com.maurigvs.bank.customers";
option java_outer_classname = "CustomerProto";

package customer;

service Company {
  rpc FindByTaxId(CustomerRequest) returns (CompanyResponse);
}

message CustomerRequest {
  string taxId = 1;
}

message CompanyResponse {
  int64 id = 1;
  string taxId = 2;
  string businessName = 3;
  string legalName = 4;
  string email = 5;
  string phone = 6;
}
